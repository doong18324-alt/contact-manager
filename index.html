<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>참여기관 담당자 연락처 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #f5f6f8; color: #374151; min-height: 100vh; }
  
  /* Header */
  .header { background: #fff; border-bottom: 1px solid #e5e7eb; }
  .header-inner { max-width: 880px; margin: 0 auto; padding: 24px 20px 14px; display: flex; justify-content: space-between; align-items: flex-start; }
  .badge-rd { display: inline-block; font-size: 11px; font-weight: 700; color: #fff; background: #1d4ed8; padding: 3px 10px; border-radius: 4px; margin-bottom: 10px; letter-spacing: 0.5px; }
  .project-title { font-size: 17px; font-weight: 800; color: #111827; line-height: 1.5; letter-spacing: -0.3px; word-break: keep-all; }
  .project-sub { font-size: 13px; color: #6b7280; margin-top: 4px; font-weight: 500; }
  .gear-btn { background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 20px; padding: 6px 10px; cursor: pointer; color: #6b7280; flex-shrink: 0; margin-top: 4px; }
  .gear-btn:hover { background: #e5e7eb; }

  /* Settings */
  .settings { background: #f9fafb; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; display: none; }
  .settings.open { display: block; }
  .settings-inner { max-width: 880px; margin: 0 auto; padding: 16px 20px; }
  .settings-input { width: 100%; padding: 10px 14px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; color: #111827; outline: none; font-family: inherit; background: #fff; }
  .settings-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  .btn-sm-primary { padding: 8px 20px; background: #1d4ed8; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-sm { padding: 8px 16px; background: #fff; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: #374151; }
  .connected-url { font-size: 12px; color: #6b7280; word-break: break-all; background: #f9fafb; padding: 8px 10px; border-radius: 6px; margin-bottom: 10px; border: 1px solid #e5e7eb; }

  /* Nav */
  .nav { max-width: 880px; margin: 0 auto; padding: 0 20px; display: flex; }
  .nav-btn { flex: 1; padding: 13px 0; border: none; background: transparent; font-size: 14px; font-weight: 600; color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent; font-family: inherit; }
  .nav-btn.active { color: #1d4ed8; font-weight: 700; border-bottom: 2.5px solid #1d4ed8; }

  /* Demo */
  .demo-banner { max-width: 880px; margin: 12px auto 0; padding: 10px 18px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; font-size: 13px; color: #1e40af; }

  /* Main */
  .main { max-width: 880px; margin: 0 auto; padding: 20px 20px 40px; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
  .card-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .card-title { font-size: 16px; font-weight: 700; color: #111827; }
  .text-btn { background: none; border: none; color: #6b7280; font-size: 13px; cursor: pointer; text-decoration: underline; font-family: inherit; }

  /* Form */
  .label { font-size: 12px; font-weight: 600; color: #6b7280; letter-spacing: 0.3px; margin-bottom: 5px; display: block; }
  .label .req { color: #dc2626; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; margin-bottom: 24px; }
  .cat-btn { padding: 11px 8px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 13px; cursor: pointer; transition: all 0.15s; background: #fff; font-family: inherit; font-weight: 500; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }
  .field-group { margin-bottom: 16px; }
  .field-group.full { grid-column: 1 / -1; }
  .input { padding: 10px 14px; background: #f9fafb; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; color: #111827; outline: none; transition: all 0.15s; font-family: inherit; width: 100%; }
  .input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  .actions { display: flex; justify-content: flex-end; align-items: center; gap: 14px; margin-top: 8px; }
  .check-mark { color: #16a34a; font-size: 13px; font-weight: 600; display: none; }
  .check-mark.show { display: inline; }
  .btn-primary { padding: 12px 36px; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary:hover { background: #1e40af; }

  /* Stats */
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat-card { background: #fff; border-radius: 10px; padding: 12px 8px; border: 1px solid #e5e7eb; border-top: 3px solid #ccc; text-align: center; cursor: pointer; transition: all 0.15s; }
  .stat-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .stat-num { font-size: 22px; font-weight: 800; color: #111827; line-height: 1; }
  .stat-lbl { font-size: 10px; color: #6b7280; margin-top: 3px; font-weight: 600; }

  /* Search */
  .search-row { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
  .search-in { flex: 1; padding: 10px 14px; background: #fff; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; color: #111827; outline: none; font-family: inherit; }
  .search-in:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.12); }
  .filter-tag { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; white-space: nowrap; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; color: #6b7280; border-bottom: 2px solid #e5e7eb; white-space: nowrap; background: #fafbfc; }
  td { padding: 10px 14px; font-size: 13px; color: #6b7280; border-bottom: 1px solid #f3f4f6; white-space: nowrap; }
  tr:hover td { background: #f8fafc; }
  .cat-badge { display: inline-block; padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 700; }
  .td-name { font-weight: 600; color: #111827; }
  .td-link { color: #2563eb; text-decoration: none; font-size: 13px; }
  .td-date { font-size: 12px; color: #9ca3af; }
  .tiny-btn { background: #fff; border: 1px solid #d1d5db; border-radius: 5px; color: #2563eb; font-size: 12px; cursor: pointer; padding: 3px 10px; margin-right: 4px; font-family: inherit; }
  .tiny-btn.del { color: #dc2626; border-color: #fecaca; }
  .foot { margin-top: 14px; font-size: 12px; color: #9ca3af; text-align: right; }
  .empty { text-align: center; padding: 48px 20px; color: #9ca3af; font-size: 14px; }
  .table-wrap { overflow-x: auto; margin: -24px; }

  /* Toast */
  .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 999; padding: 10px 28px; border-radius: 8px; color: #fff; font-size: 14px; font-weight: 600; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: none; animation: slideDown 0.3s ease; }
  .toast.show { display: block; }
  .toast.success { background: #16a34a; }
  .toast.error { background: #dc2626; }

  .hidden { display: none; }

  @keyframes slideDown { from { transform: translateX(-50%) translateY(-10px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  @keyframes fadeUp { from { transform: translateY(6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .fade-up { animation: fadeUp 0.25s ease; }

  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .field-grid { grid-template-columns: 1fr; }
    .cat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div>
      <span class="badge-rd">문화체육관광부 R&D</span>
      <h1 class="project-title">지능형 스포츠마일리지 기반 개인 맞춤형 운동추천관리 서비스 기술 개발 및 리빙랩 실증</h1>
      <p class="project-sub">참여기관 담당자 연락처 관리</p>
    </div>
    <button class="gear-btn" onclick="toggleSettings()" title="Google Sheets 설정">⚙</button>
  </div>

  <!-- Settings Panel -->
  <div class="settings" id="settingsPanel">
    <div class="settings-inner">
      <strong style="font-size:14px;color:#111827">Google Sheets 연동 설정</strong>
      <p style="font-size:12px;color:#6b7280;margin-top:4px;line-height:1.5;margin-bottom:10px">
        Google Apps Script 배포 후 받은 URL을 아래에 붙여넣기 하세요.
      </p>
      <div id="settingsDisconnected">
        <input class="settings-input" id="urlInput" placeholder="https://script.google.com/macros/s/...../exec">
        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn-sm-primary" onclick="connectSheet()">연동하기</button>
          <button class="btn-sm" onclick="toggleSettings()">취소</button>
        </div>
      </div>
      <div id="settingsConnected" class="hidden">
        <div style="font-size:12px;color:#059669;font-weight:600;margin-bottom:6px">✓ 연동됨</div>
        <div class="connected-url" id="connectedUrlDisplay"></div>
        <button class="btn-sm" style="color:#dc2626" onclick="disconnectSheet()">연동 해제</button>
      </div>
    </div>
  </div>

  <!-- Nav -->
  <div class="nav">
    <button class="nav-btn active" id="navRegister" onclick="switchView('register')">담당자 등록</button>
    <button class="nav-btn" id="navDirectory" onclick="switchView('directory')">등록 현황 (<span id="totalCount">0</span>)</button>
  </div>
</header>

<!-- Demo Banner -->
<div class="demo-banner" id="demoBanner">
  <strong>데모 모드</strong> — 우측 상단 ⚙ 버튼을 눌러 Google Sheets 연동 URL을 입력하세요.
</div>

<main class="main">
  <!-- ═══ 등록 화면 ═══ -->
  <div id="registerView" class="fade-up">
    <div class="card">
      <div class="card-head">
        <h2 class="card-title" id="formTitle">담당자 등록</h2>
        <button class="text-btn hidden" id="cancelEditBtn" onclick="cancelEdit()">수정 취소</button>
      </div>

      <!-- 구분 -->
      <div>
        <label class="label">구분 <span class="req">*</span></label>
        <div class="cat-grid" id="catGrid"></div>
      </div>

      <!-- 필드 -->
      <div class="field-grid">
        <div class="field-group">
          <label class="label">기관명 <span class="req">*</span></label>
          <input class="input" id="fInstitution" placeholder="예: 광주보건대학교">
        </div>
        <div class="field-group">
          <label class="label">부서</label>
          <input class="input" id="fDepartment" placeholder="예: AI스포츠테크연구센터">
        </div>
        <div class="field-group">
          <label class="label">이름 <span class="req">*</span></label>
          <input class="input" id="fName" placeholder="예: 홍길동">
        </div>
        <div class="field-group">
          <label class="label">휴대폰번호</label>
          <input class="input" id="fPhone" placeholder="예: 010-1234-5678">
        </div>
      </div>
      <div class="field-group full" style="margin-bottom:24px">
        <label class="label">이메일</label>
        <input class="input" id="fEmail" placeholder="예: name@institution.ac.kr">
      </div>

      <div class="actions">
        <span class="check-mark" id="checkMark">✓ 등록 완료</span>
        <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">등록하기</button>
      </div>
    </div>
  </div>

  <!-- ═══ 등록 현황 화면 ═══ -->
  <div id="directoryView" class="fade-up hidden">
    <div class="stats" id="statsRow"></div>

    <div class="search-row">
      <input class="search-in" id="searchInput" placeholder="기관명, 이름, 이메일 등 검색..." oninput="renderTable()">
      <span id="filterTagWrap"></span>
    </div>

    <div class="card">
      <div class="table-wrap" id="tableWrap"></div>
      <div class="foot" id="tableFoot"></div>
    </div>
  </div>
</main>

<script>
// ─── State ───
let scriptUrl = "";
let contacts = [];
let editingRow = null;
let currentView = "register";
let filterCat = "전체";
let selectedCategory = "";

const CATEGORIES = ["주관연구개발기관", "공동연구개발기관", "위탁연구개발기관", "협력기관"];
const CAT_COLOR = {
  주관연구개발기관: { bg: "#1d4ed8", light: "#dbeafe", text: "#1e40af" },
  공동연구개발기관: { bg: "#059669", light: "#d1fae5", text: "#065f46" },
  위탁연구개발기관: { bg: "#d97706", light: "#fef3c7", text: "#92400e" },
  협력기관: { bg: "#7c3aed", light: "#ede9fe", text: "#5b21b6" },
};

const DEMO = [
  { rowIndex: 2, 기관명: "광주보건대학교", 부서: "노인운동처방학과", 이름: "김현중", 휴대폰번호: "010-1234-5678", 이메일: "hj@gwhu.ac.kr", 구분: "주관연구개발기관", 등록일시: "2026-03-11 09:00" },
  { rowIndex: 3, 기관명: "오마주AI", 부서: "기술개발팀", 이름: "이민수", 휴대폰번호: "010-9876-5432", 이메일: "ms@omaju.ai", 구분: "공동연구개발기관", 등록일시: "2026-03-11 09:15" },
  { rowIndex: 4, 기관명: "BISOL", 부서: "연구소", 이름: "박지연", 휴대폰번호: "010-5555-1234", 이메일: "jy@bisol.kr", 구분: "공동연구개발기관", 등록일시: "2026-03-11 10:00" },
  { rowIndex: 5, 기관명: "한국체육대학교", 부서: "스포츠과학연구소", 이름: "정태호", 휴대폰번호: "010-2222-3333", 이메일: "th@knsu.ac.kr", 구분: "위탁연구개발기관", 등록일시: "2026-03-11 10:30" },
  { rowIndex: 6, 기관명: "광주광역시체육회", 부서: "생활체육과", 이름: "송미래", 휴대폰번호: "010-7777-8888", 이메일: "mr@gjsports.or.kr", 구분: "협력기관", 등록일시: "2026-03-11 11:00" },
];

// ─── Toast ───
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  setTimeout(() => { t.className = "toast"; }, 3000);
}

// ─── Settings ───
function toggleSettings() {
  document.getElementById("settingsPanel").classList.toggle("open");
}

function connectSheet() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) { showToast("URL을 입력해주세요.", "error"); return; }
  scriptUrl = url;
  document.getElementById("settingsDisconnected").classList.add("hidden");
  document.getElementById("settingsConnected").classList.remove("hidden");
  document.getElementById("connectedUrlDisplay").textContent = url;
  document.getElementById("demoBanner").classList.add("hidden");
  showToast("Google Sheets 연동 완료!");
  fetchData();
  toggleSettings();
}

function disconnectSheet() {
  scriptUrl = "";
  document.getElementById("urlInput").value = "";
  document.getElementById("settingsDisconnected").classList.remove("hidden");
  document.getElementById("settingsConnected").classList.add("hidden");
  document.getElementById("demoBanner").classList.remove("hidden");
  contacts = [...DEMO];
  updateAll();
  showToast("연동 해제됨 (데모 모드)");
}

// ─── Navigation ───
function switchView(v) {
  currentView = v;
  document.getElementById("registerView").classList.toggle("hidden", v !== "register");
  document.getElementById("directoryView").classList.toggle("hidden", v !== "directory");
  document.getElementById("navRegister").classList.toggle("active", v === "register");
  document.getElementById("navDirectory").classList.toggle("active", v === "directory");
  if (v === "directory") renderTable();
}

// ─── Data Fetch ───
async function fetchData() {
  if (!scriptUrl) { contacts = [...DEMO]; updateAll(); return; }
  try {
    const r = await fetch(scriptUrl + "?action=read");
    const j = await r.json();
    if (j.status === "success") contacts = j.data;
    updateAll();
  } catch (e) { showToast("데이터 로딩 실패", "error"); }
}

// ─── Category Buttons ───
function renderCatGrid() {
  const grid = document.getElementById("catGrid");
  grid.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.textContent = cat;
    const c = CAT_COLOR[cat];
    const sel = selectedCategory === cat;
    btn.style.background = sel ? c.bg : "#fff";
    btn.style.color = sel ? "#fff" : c.text;
    btn.style.borderColor = sel ? c.bg : "#d1d5db";
    btn.style.fontWeight = sel ? "700" : "500";
    btn.onclick = () => { selectedCategory = cat; renderCatGrid(); };
    grid.appendChild(btn);
  });
}

// ─── Submit ───
async function handleSubmit() {
  const inst = document.getElementById("fInstitution").value.trim();
  const dept = document.getElementById("fDepartment").value.trim();
  const name = document.getElementById("fName").value.trim();
  const phone = document.getElementById("fPhone").value.trim();
  const email = document.getElementById("fEmail").value.trim();
  const cat = selectedCategory;

  if (!inst || !name || !cat) { showToast("기관명, 이름, 구분은 필수입니다.", "error"); return; }

  if (!scriptUrl) {
    // Demo mode
    if (editingRow) {
      contacts = contacts.map(c => c.rowIndex === editingRow
        ? { ...c, 기관명: inst, 부서: dept, 이름: name, 휴대폰번호: phone, 이메일: email, 구분: cat } : c);
      showToast("수정 완료 (데모)");
    } else {
      contacts.push({
        rowIndex: Date.now(), 기관명: inst, 부서: dept,
        이름: name, 휴대폰번호: phone, 이메일: email,
        구분: cat, 등록일시: new Date().toLocaleString("ko-KR"),
      });
      showToast("등록 완료 (데모)");
    }
    clearForm();
    updateAll();
    showCheck();
    return;
  }

  document.getElementById("submitBtn").disabled = true;
  document.getElementById("submitBtn").textContent = "처리중...";
  try {
    const params = new URLSearchParams({
      action: editingRow ? "update" : "create",
      institution: inst, department: dept, name, phone, email, category: cat,
      ...(editingRow ? { rowIndex: editingRow } : {}),
    });
    await fetch(scriptUrl + "?" + params.toString());
    showToast(editingRow ? "수정 완료" : "등록 완료");
    clearForm();
    fetchData();
    showCheck();
  } catch { showToast("저장 실패", "error"); }
  finally {
    document.getElementById("submitBtn").disabled = false;
    document.getElementById("submitBtn").textContent = editingRow ? "수정 저장" : "등록하기";
  }
}

function clearForm() {
  document.getElementById("fInstitution").value = "";
  document.getElementById("fDepartment").value = "";
  document.getElementById("fName").value = "";
  document.getElementById("fPhone").value = "";
  document.getElementById("fEmail").value = "";
  selectedCategory = "";
  editingRow = null;
  document.getElementById("formTitle").textContent = "담당자 등록";
  document.getElementById("cancelEditBtn").classList.add("hidden");
  document.getElementById("submitBtn").textContent = "등록하기";
  renderCatGrid();
}

function showCheck() {
  const cm = document.getElementById("checkMark");
  cm.classList.add("show");
  setTimeout(() => cm.classList.remove("show"), 2500);
}

// ─── Edit / Delete ───
function handleEdit(rowIndex) {
  const c = contacts.find(x => x.rowIndex === rowIndex);
  if (!c) return;
  document.getElementById("fInstitution").value = c["기관명"] || "";
  document.getElementById("fDepartment").value = c["부서"] || "";
  document.getElementById("fName").value = c["이름"] || "";
  document.getElementById("fPhone").value = c["휴대폰번호"] || "";
  document.getElementById("fEmail").value = c["이메일"] || "";
  selectedCategory = c["구분"] || "";
  editingRow = rowIndex;
  document.getElementById("formTitle").textContent = "담당자 정보 수정";
  document.getElementById("cancelEditBtn").classList.remove("hidden");
  document.getElementById("submitBtn").textContent = "수정 저장";
  document.getElementById("checkMark").textContent = "✓ 수정 완료";
  renderCatGrid();
  switchView("register");
}

function cancelEdit() { clearForm(); }

async function handleDelete(rowIndex) {
  if (!confirm("삭제하시겠습니까?")) return;
  if (!scriptUrl) {
    contacts = contacts.filter(c => c.rowIndex !== rowIndex);
    updateAll(); renderTable();
    showToast("삭제 완료 (데모)"); return;
  }
  try {
    await fetch(scriptUrl + "?" + new URLSearchParams({ action: "delete", rowIndex }));
    showToast("삭제 완료"); fetchData();
  } catch { showToast("삭제 실패", "error"); }
}

// ─── Filter ───
function setFilter(cat) {
  filterCat = (filterCat === cat) ? "전체" : cat;
  renderStats(); renderTable();
}

function clearFilter() { filterCat = "전체"; renderStats(); renderTable(); }

// ─── Render ───
function updateAll() {
  document.getElementById("totalCount").textContent = contacts.length;
  renderStats();
  renderTable();
}

function renderStats() {
  const row = document.getElementById("statsRow");
  let html = `<div class="stat-card" style="border-top-color:#374151;${filterCat==='전체'?'background:#f3f4f6':''}" onclick="setFilter('전체')">
    <div class="stat-num">${contacts.length}</div><div class="stat-lbl">전체</div></div>`;
  CATEGORIES.forEach(cat => {
    const c = CAT_COLOR[cat];
    const cnt = contacts.filter(x => x["구분"] === cat).length;
    const active = filterCat === cat;
    html += `<div class="stat-card" style="border-top-color:${c.bg};${active?'background:'+c.light:''}" onclick="setFilter('${cat}')">
      <div class="stat-num" style="color:${c.text}">${cnt}</div>
      <div class="stat-lbl" style="color:${c.text}">${cat.replace("연구개발기관","연구개발")}</div></div>`;
  });
  row.innerHTML = html;
}

function renderTable() {
  const search = (document.getElementById("searchInput")?.value || "").toLowerCase();
  const filtered = contacts.filter(c => {
    const catOk = filterCat === "전체" || c["구분"] === filterCat;
    const sOk = !search || Object.values(c).some(v => String(v).toLowerCase().includes(search));
    return catOk && sOk;
  });

  // Filter tag
  const ftw = document.getElementById("filterTagWrap");
  if (filterCat !== "전체") {
    const c = CAT_COLOR[filterCat];
    ftw.innerHTML = `<button class="filter-tag" style="background:${c.light};color:${c.text}" onclick="clearFilter()">${filterCat} ✕</button>`;
  } else { ftw.innerHTML = ""; }

  const wrap = document.getElementById("tableWrap");
  if (filtered.length === 0) {
    wrap.innerHTML = `<div class="empty" style="margin:24px">${contacts.length === 0 ? "등록된 담당자가 없습니다. '담당자 등록' 탭에서 추가해주세요." : "검색 결과가 없습니다."}</div>`;
  } else {
    let html = `<table><thead><tr>
      <th>구분</th><th>기관명</th><th>부서</th><th>이름</th><th>휴대폰번호</th><th>이메일</th><th>등록일시</th><th style="text-align:center;width:90px">관리</th>
    </tr></thead><tbody>`;
    filtered.forEach(c => {
      const cc = CAT_COLOR[c["구분"]] || CAT_COLOR["협력기관"];
      html += `<tr>
        <td><span class="cat-badge" style="background:${cc.light};color:${cc.text}">${(c["구분"]||"").replace("연구개발기관","연구개발")}</span></td>
        <td class="td-name">${c["기관명"]||""}</td>
        <td>${c["부서"]||"-"}</td>
        <td class="td-name">${c["이름"]||""}</td>
        <td><a class="td-link" href="tel:${c["휴대폰번호"]||""}">${c["휴대폰번호"]||"-"}</a></td>
        <td><a class="td-link" href="mailto:${c["이메일"]||""}">${c["이메일"]||"-"}</a></td>
        <td class="td-date">${c["등록일시"]||""}</td>
        <td style="text-align:center">
          <button class="tiny-btn" onclick="handleEdit(${c.rowIndex})">수정</button>
          <button class="tiny-btn del" onclick="handleDelete(${c.rowIndex})">삭제</button>
        </td>
      </tr>`;
    });
    html += "</tbody></table>";
    wrap.innerHTML = html;
  }
  document.getElementById("tableFoot").textContent = `총 ${filtered.length}건${filterCat !== "전체" ? " · " + filterCat : ""}`;
}

// ─── Init ───
renderCatGrid();
contacts = [...DEMO];
updateAll();
</script>
</body>
</html>
